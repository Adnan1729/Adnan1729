<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340">
  <style>
    .label { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 15px; fill: #003840; font-weight: 500; }
    .name { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 13px; fill: #003840; letter-spacing: 0.08em; }
    .dot { fill: #003840; }
    .dot-a { animation: drift-a 9s ease-in-out infinite; transform-origin: 780px 170px; }
    .dot-b { animation: drift-b 11s ease-in-out infinite; transform-origin: 980px 90px; }
    .dot-c { animation: drift-c 13s ease-in-out infinite; transform-origin: 680px 260px; }
    .dot-d { animation: drift-d 10s ease-in-out infinite; transform-origin: 1080px 240px; }

    @keyframes drift-a {
      0%, 100% { transform: translate(0, 0); }
      50%      { transform: translate(-8px, 6px); }
    }
    @keyframes drift-b {
      0%, 100% { transform: translate(0, 0); }
      50%      { transform: translate(6px, -4px); }
    }
    @keyframes drift-c {
      0%, 100% { transform: translate(0, 0); }
      50%      { transform: translate(4px, 5px); }
    }
    @keyframes drift-d {
      0%, 100% { transform: translate(0, 0); }
      50%      { transform: translate(-5px, -3px); }
    }
  </style>

  <text x="60" y="90" class="label">Autonomous agents.</text>
  <text x="60" y="120" class="label">Real-time data fusion.</text>
  <text x="60" y="150" class="label">Bayesian graphical modelling.</text>

  <text x="60" y="290" class="name">ADNAN MAHMUD</text>

  <circle class="dot dot-a" cx="780" cy="170" r="95" />
  <circle class="dot dot-b" cx="980" cy="90"  r="38" />
  <circle class="dot dot-c" cx="680" cy="260" r="28" />
  <circle class="dot dot-d" cx="1080" cy="240" r="18" />
</svg>
